<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Flappy Bird Mobile</title>

<!-- Google AdSense -->
<script async 
src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2678799772933573"
crossorigin="anonymous"></script>

<meta name="google-adsense-account" content="ca-pub-2678799772933573">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html, body{
width:100%;
height:100%;
overflow:hidden;
background:#70c5ce;
}

#game{
position:fixed;
top:0;
left:0;
}

#ad-container{
position:fixed;
bottom:0;
left:0;
width:100%;
height:60px;
background:#fff;
z-index:9999;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="ad-container">
<ins class="adsbygoogle"
     style="display:block;width:100%;height:60px"
     data-ad-client="ca-pub-2678799772933573"
     data-ad-slot="2076942226"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>
</div>

<script>
(adsbygoogle = window.adsbygoogle || []).push({});
</script>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const AD_HEIGHT = 60;

function resizeCanvas(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight - AD_HEIGHT;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

const gravity = 0.6;
const jump = -10;
const pipeWidth = 70;

let pipeGap = 200;
let pipeSpeed = 3;
let state = "start";
let frame = 0;
let score = 0;

let bird = {
x: 120,
y: 300,
radius: 20,
velocity: 0
};

let pipes = [];

function resetGame(){
bird.y = canvas.height/2;
bird.velocity = 0;
pipes = [];
score = 0;
frame = 0;
state = "playing";
}

function drawBird(){
ctx.beginPath();
ctx.arc(bird.x, bird.y, bird.radius, 0, Math.PI*2);
ctx.fillStyle = "yellow";
ctx.fill();
ctx.stroke();
}

function drawPipes(){
ctx.fillStyle="green";
pipes.forEach(pipe=>{
ctx.fillRect(pipe.x,0,pipeWidth,pipe.top);
ctx.fillRect(pipe.x,pipe.top+pipeGap,pipeWidth,canvas.height);
});
}

function updatePipes(){
if(frame % 90 === 0){
let topHeight = Math.random()*(canvas.height-300)+80;
pipes.push({x:canvas.width,top:topHeight,passed:false});
}

pipes.forEach(pipe=>{
pipe.x -= pipeSpeed;

if(!pipe.passed && pipe.x+pipeWidth < bird.x){
score++;
pipe.passed = true;
}

if(
bird.x+bird.radius > pipe.x &&
bird.x-bird.radius < pipe.x+pipeWidth &&
(bird.y-bird.radius < pipe.top ||
bird.y+bird.radius > pipe.top+pipeGap)
){
state="gameover";
}
});

pipes = pipes.filter(pipe=>pipe.x+pipeWidth>0);
}

function updateBird(){
bird.velocity += gravity;
bird.y += bird.velocity;

if(bird.y+bird.radius > canvas.height){
state="gameover";
}
}

function drawText(text,size,y){
ctx.fillStyle="#000";
ctx.font=size+"px Arial";
ctx.textAlign="center";
ctx.fillText(text,canvas.width/2,y);
}

function gameLoop(){
ctx.clearRect(0,0,canvas.width,canvas.height);

if(state==="start"){
drawText("Flappy Bird",32,canvas.height/2);
drawText("Tap to Start",20,canvas.height/2+40);
}
else if(state==="playing"){
updateBird();
updatePipes();
drawPipes();
drawBird();
ctx.fillText("Score: "+score,20,40);
frame++;
}
else if(state==="gameover"){
drawText("Game Over",30,canvas.height/2);
drawText("Score: "+score,20,canvas.height/2+40);
drawText("Tap to Restart",18,canvas.height/2+80);
}

requestAnimationFrame(gameLoop);
}

function flap(){
if(state==="start"){
resetGame();
}
else if(state==="playing"){
bird.velocity = jump;
}
else if(state==="gameover"){
state="start";
}
}

window.addEventListener("touchstart", function(e){
e.preventDefault();
flap();
},{passive:false});

window.addEventListener("click", flap);

gameLoop();
</script>

</body>
</html>
