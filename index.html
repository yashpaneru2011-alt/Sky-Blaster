<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird Mobile Pro</title>

<style>
body{
margin:0;
overflow:hidden;
background:#70c5ce;
}

canvas{
display:block;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// Full Height Canvas (Phone Ready)
function resizeCanvas(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

const gravity = 0.5;
const jump = -8;
const pipeWidth = 65;

let pipeGap = 180;
let pipeSpeed = 3;
let level = 1;

let state = "start";

let bird = {
x: 100,
y: 300,
radius: 20,
velocity: 0,
rotation: 0
};

let pipes = [];
let frame = 0;
let score = 0;

function resetGame(){
bird.y = canvas.height/2;
bird.velocity = 0;
bird.rotation = 0;
pipes = [];
score = 0;
frame = 0;
level = 1;
pipeSpeed = 3;
pipeGap = 180;
state = "playing";
}

function drawBird(){
ctx.save();
ctx.translate(bird.x, bird.y);
ctx.rotate(bird.rotation);

ctx.beginPath();
ctx.arc(0, 0, bird.radius, 0, Math.PI*2);
ctx.fillStyle="yellow";
ctx.fill();
ctx.stroke();

ctx.restore();
}

function drawPipes(){
ctx.fillStyle="green";
pipes.forEach(pipe=>{
ctx.fillRect(pipe.x,0,pipeWidth,pipe.top);
ctx.fillRect(pipe.x,pipe.top+pipeGap,pipeWidth,canvas.height);
});
}

function updatePipes(){
if(frame%85===0){
let topHeight=Math.random()*(canvas.height-300)+50;
pipes.push({x:canvas.width,top:topHeight,passed:false});
}

pipes.forEach(pipe=>{
pipe.x-=pipeSpeed;

if(!pipe.passed && pipe.x+pipeWidth<bird.x){
score++;
pipe.passed=true;

// 🔥 Level system
if(score%5===0){
level++;
pipeSpeed+=0.5;     // ⚡ speed increase
pipeGap-=8;         // harder gap
}
}

if(
bird.x+bird.radius > pipe.x &&
bird.x-bird.radius < pipe.x+pipeWidth &&
(bird.y-bird.radius < pipe.top ||
bird.y+bird.radius > pipe.top+pipeGap)
){
state="gameover";
}
});

pipes=pipes.filter(pipe=>pipe.x+pipeWidth>0);
}

function updateBird(){
bird.velocity+=gravity;
bird.y+=bird.velocity;

// 🦅 Smooth rotation
if(bird.velocity<0){
bird.rotation=-0.4;
}else{
bird.rotation=Math.min(bird.rotation+0.04,0.7);
}

if(bird.y+bird.radius>canvas.height || bird.y-bird.radius<0){
state="gameover";
}
}

function drawUI(){
ctx.fillStyle="#000";
ctx.font="22px Arial";
ctx.fillText("Score: "+score,20,40);
ctx.fillText("Level: "+level,20,75);
}

function drawStart(){
ctx.fillStyle="#000";
ctx.font="30px Arial";
ctx.fillText("Flappy Bird",canvas.width/2-90,canvas.height/2);
ctx.font="20px Arial";
ctx.fillText("Tap to Start",canvas.width/2-60,canvas.height/2+40);
}

function drawGameOver(){
ctx.fillStyle="#000";
ctx.font="32px Arial";
ctx.fillText("Game Over",canvas.width/2-90,canvas.height/2);
ctx.font="20px Arial";
ctx.fillText("Tap to Restart",canvas.width/2-80,canvas.height/2+40);
}

function gameLoop(){
ctx.clearRect(0,0,canvas.width,canvas.height);

if(state==="start"){
drawStart();
}
else if(state==="playing"){
updateBird();
updatePipes();
drawPipes();
drawBird();
drawUI();
frame++;
}
else if(state==="gameover"){
drawGameOver();
drawUI();
}

requestAnimationFrame(gameLoop);
}

function flap(){
if(state==="start"){
resetGame();
}
else if(state==="playing"){
bird.velocity=jump;
}
else if(state==="gameover"){
state="start";
}
}

// 📱 Smooth touch
window.addEventListener("touchstart", function(e){
e.preventDefault();
flap();
}, {passive:false});

window.addEventListener("click", flap);
document.addEventListener("keydown", e=>{
if(e.code==="Space") flap();
});

gameLoop();
</script>

</body>
</html>
