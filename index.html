<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird Ultimate FX</title>
<style>
body{margin:0;overflow:hidden;}
canvas{
position:fixed;
top:0;left:0;
width:100vw;height:100vh;
display:block;
touch-action:none;
}
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resizeCanvas(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize",resizeCanvas);

/* ---------- SOUND ---------- */
const flapSound=new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
const scoreSound=new Audio("https://www.soundjay.com/buttons/sounds/button-4.mp3");
const hitSound=new Audio("https://www.soundjay.com/buttons/sounds/button-10.mp3");

/* ---------- BACKGROUND MUSIC ---------- */
const bgMusic=new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3");
bgMusic.loop=true;
bgMusic.volume=0.25;

/* ---------- DAY NIGHT ---------- */
let dayTime=true;
let dayNightTimer=0;

/* ---------- STARFIELD ---------- */
let stars=[];
function createStars(){
stars=[];
for(let i=0;i<120;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2
});
}
}
createStars();

function drawStars(){
ctx.fillStyle="white";
stars.forEach(s=>{
ctx.fillRect(s.x,s.y,s.size,s.size);
});
}

/* ---------- FIRE PARTICLES ---------- */
let particles=[];

function createFire(x,y){
for(let i=0;i<15;i++){
particles.push({
x:x,
y:y,
vx:(Math.random()-0.5)*4,
vy:(Math.random()-1.5)*4,
size:Math.random()*6+2,
life:40
});
}
}

function updateParticles(){
particles.forEach(p=>{
p.x+=p.vx;
p.y+=p.vy;
p.life--;
p.size*=0.95;
});
particles=particles.filter(p=>p.life>0);

particles.forEach(p=>{
ctx.fillStyle="orange";
ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fill();
});
}

/* ---------- PARALLAX CLOUDS ---------- */
let clouds=[];
function createCloud(){
clouds.push({
x:canvas.width,
y:Math.random()*canvas.height*0.5,
size:Math.random()*50+40,
speed:Math.random()*1+0.5
});
}

function updateClouds(){
if(Math.random()<0.02) createCloud();
clouds.forEach(c=>{
c.x-=c.speed;
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(c.x,c.y,c.size,0,Math.PI*2);
ctx.fill();
});
clouds=clouds.filter(c=>c.x>-200);
}

/* ---------- MOUNTAINS ---------- */
let mountainOffset=0;
function drawMountains(){
mountainOffset-=0.3;
if(mountainOffset<-canvas.width) mountainOffset=0;
ctx.fillStyle=dayTime?"#556B2F":"#2F4F4F";
for(let i=0;i<2;i++){
ctx.beginPath();
ctx.moveTo(mountainOffset+i*canvas.width,canvas.height);
ctx.lineTo(mountainOffset+200+i*canvas.width,canvas.height-150);
ctx.lineTo(mountainOffset+400+i*canvas.width,canvas.height);
ctx.closePath();
ctx.fill();
}
}

/* ---------- GAME SETTINGS ---------- */
const gravity=0.5;
const jump=-10;
const pipeWidth=70;

let pipeGap=180;
let pipeSpeed=3;

let state="start";

let bird={
x:100,
y:300,
radius:20,
velocity:0
};

let pipes=[];
let frame=0;
let score=0;
let displayScore=0; // animated score

function resetGame(){
bird.y=canvas.height/2;
bird.velocity=0;
pipes=[];
score=0;
displayScore=0;
frame=0;
state="playing";
bgMusic.play();
}

function drawSky(){
let g=ctx.createLinearGradient(0,0,0,canvas.height);
if(dayTime){
g.addColorStop(0,"#70c5ce");
g.addColorStop(1,"#ffffff");
}else{
g.addColorStop(0,"#0f2027");
g.addColorStop(1,"#203a43");
}
ctx.fillStyle=g;
ctx.fillRect(0,0,canvas.width,canvas.height);
}

function drawBird(){
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(bird.x,bird.y,bird.radius,0,Math.PI*2);
ctx.fill();
}

function drawPipes(){
ctx.fillStyle="green";
pipes.forEach(p=>{
ctx.fillRect(p.x,0,pipeWidth,p.top);
ctx.fillRect(p.x,p.top+pipeGap,pipeWidth,canvas.height);
});
}

function updatePipes(){
if(frame%90===0){
let topHeight=Math.random()*(canvas.height-300)+50;
pipes.push({x:canvas.width,top:topHeight,passed:false});
}

pipes.forEach(p=>{
p.x-=pipeSpeed;

if(!p.passed && p.x+pipeWidth<bird.x){
score++;
scoreSound.play();
createFire(bird.x,bird.y);
p.passed=true;
}

if(
bird.x+bird.radius>p.x &&
bird.x-bird.radius<p.x+pipeWidth &&
(bird.y-bird.radius<p.top ||
bird.y+bird.radius>p.top+pipeGap)
){
hitSound.play();
bgMusic.pause();
state="gameover";
}
});

pipes=pipes.filter(p=>p.x+pipeWidth>0);
}

function updateBird(){
bird.velocity+=gravity;
bird.y+=bird.velocity;

if(bird.y+bird.radius>canvas.height ||
bird.y-bird.radius<0){
hitSound.play();
bgMusic.pause();
state="gameover";
}
}

/* Animated Score */
function drawScore(){
if(displayScore<score){
displayScore+=0.2;
}
ctx.fillStyle=dayTime?"#000":"#fff";
ctx.font="30px Arial";
ctx.fillText(Math.floor(displayScore),canvas.width/2-10,50);
}

/* ---------- LOOP ---------- */
function gameLoop(){
ctx.clearRect(0,0,canvas.width,canvas.height);

drawSky();

dayNightTimer++;
if(dayNightTimer>1200){
dayTime=!dayTime;
dayNightTimer=0;
}

if(!dayTime) drawStars();

updateClouds();
drawMountains();

if(state==="playing"){
updateBird();
updatePipes();
drawPipes();
drawBird();
drawScore();
frame++;
}
else if(state==="start"){
ctx.fillStyle="#000";
ctx.font="30px Arial";
ctx.fillText("Tap to Start",canvas.width/2-90,canvas.height/2);
}
else if(state==="gameover"){
ctx.fillStyle="red";
ctx.font="30px Arial";
ctx.fillText("Game Over",canvas.width/2-80,canvas.height/2);
}

updateParticles();

requestAnimationFrame(gameLoop);
}

function flap(){
if(state==="start"){
resetGame();
}
else if(state==="playing"){
bird.velocity=jump;
flapSound.play();
}
else if(state==="gameover"){
state="start";
}
}

window.addEventListener("touchstart",e=>{
e.preventDefault();
flap();
},{passive:false});
window.addEventListener("click",flap);
document.addEventListener("keydown",e=>{
if(e.code==="Space") flap();
});

gameLoop();
</script>
</body>
</html>
